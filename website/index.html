<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">

    <!-- Left Side -->
    <div class="left">

        <div class="overlay"></div>

        <div class="welcome">

            <!-- Replace logo.png with your Easy Ride logo -->
            <img src="new.png" class="logo">

            <h1>Easy Ride</h1>

            <p>Ride Easy, Arrive Happy.</p>

        </div>

    </div>



    <!-- Right Side -->
    <form action="" class="right" id="form">
        <div class="login-card">

            <h2>Welcome Back 👋</h2>

            <p>Login to continue your journey.</p>


            <form id="loginForm">

                <div class="input-box">

                    <i class="fa-solid fa-envelope"></i>

                    <input
                    type="email"
                    placeholder="Email Address"
                    required>

                </div>


                <div class="input-box password">

                    <i class="fa-solid fa-lock"></i>

                    <input
                    type="password"
                    placeholder="Password"
                    id="password"
                    required>

                    <i
                    class="fa-solid fa-eye"
                    id="eye"></i>

                </div>


                <div class="options">

                    <label>

                        <input type="checkbox">

                        Remember Me

                    </label>

                    <a href="#">Forgot Password?</a>

                </div>


                <button>

                    Login

                </button>


                <div class="signup">

                    Don't have an account?

                    <a href="signup.html">Sign Up</a>

                </div>

            </form>

        </div>

    </form>

</div>

</body>
<script>

</script>
</html>
