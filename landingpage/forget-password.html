<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Easy Ride</title>
    <link rel="shortcut icon" href="favicon.ico" type="image/image/logo">
    <link rel="icon" href="/image/easy-ride logo.png">
    <link rel="stylesheet" href="/style.css">
</head>
</head>

<body>
    <div class="bbb">
        <div class="container">

            <div class="logooo">
                <h1>
                    <span>Easy</span> Ride
                </h1>
            </div>

            <div class="title">
                <div class="line"></div>
                <p>FORGOT PASSWORD</p>
                <div class="line"></div>
            </div>

            <p class="subtitle">
                Enter your email and phone, and we'll send you a link
                to reset your password.
            </p>

            <form action="forget.html">
                <label>Email</label>
                <input type="email" placeholder="Email" required>

                <label>Phone</label>
                <div class="phone-box">
                    <select required>
                        <option value="+234">+234</option>
                        <option value="+1">+1</option>
                        <option value="+44">+44</option>
                        <option value="+91">+91</option>
                        <option value="+233">+233</option>
                        <option value="+27">+27</option>
                    </select>

                    <input type="tel" placeholder="8021234567" required>

                </div>

                <p class="info">
                    Select your international country code and enter your phone number.
                    Spaces, brackets and dashes will automatically be removed.
                </p>

                <a href="forget.html" class="reset-btns">Reset Password →</a>

                <a href="login.html" class="back-btns">Back</a>

            </form>

            <div class="language">
                <p>
                    🌐 English, Nigeria ▼
                </p>

            </div>

        </div>
    </div>

</body>

</html>
